name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            runner: ubuntu-latest
            goarch: amd64
            artifact: libadbc_driver_oracle_linux_amd64.so
          - name: linux-arm64
            runner: ubuntu-latest
            goarch: arm64
            cc: aarch64-linux-gnu-gcc
            cross_pkg: gcc-aarch64-linux-gnu
            artifact: libadbc_driver_oracle_linux_arm64.so
          - name: darwin-arm64
            runner: macos-latest
            goarch: arm64
            artifact: libadbc_driver_oracle_darwin_arm64.dylib
          - name: darwin-amd64
            runner: macos-latest
            goarch: amd64
            artifact: libadbc_driver_oracle_darwin_amd64.dylib
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install cross-compiler
        if: matrix.cross_pkg
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.cross_pkg }}

      - name: Build shared library
        env:
          CGO_ENABLED: "1"
          GOARCH: ${{ matrix.goarch }}
        run: |
          if [ -n "${{ matrix.cc }}" ]; then
            export CC="${{ matrix.cc }}"
          fi
          go build -tags driverlib -buildmode=c-shared \
            -o ${{ matrix.artifact }} ./pkg/oracle/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f \( -name '*.so' -o -name '*.dylib' \) -exec sha256sum {} \; | \
            sed 's|  \./[^/]*/|  |' > ../checksums.txt
          cat ../checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.so
            artifacts/**/*.dylib
            checksums.txt
